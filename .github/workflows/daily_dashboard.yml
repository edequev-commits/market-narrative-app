name: Daily Market Dashboard

on:
  workflow_dispatch:

jobs:
  run-dashboard:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Clonar repo
        uses: actions/checkout@v6

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Crear carpeta config
        run: mkdir -p config

      - name: Reconstruir credenciales Gmail
        run: |
          echo "${{ secrets.GMAIL_CREDENTIALS_B64 }}" | base64 -d > config/credentials.json
          echo "${{ secrets.GMAIL_TOKEN_B64 }}" | base64 -d > config/token.json

      - name: Setear variables
        run: |
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> $GITHUB_ENV

      - name: Ejecutar app
        run: python app.py

      - name: Generar HTML estático
        run: python build_static_dashboard.py

      - name: Validar JSON generado
        run: |
          python -m json.tool data/dashboard_payload.json > /dev/null
          python -m json.tool data/filtered_signal.json > /dev/null
          python -m json.tool data/vital_knowledge_extracted.json > /dev/null
          python -m json.tool data/reuters_extracted.json > /dev/null
          python -m json.tool data/cnbc_extracted.json > /dev/null

      - name: Validar artefacto HTML
        run: |
          test -f dist/index.html
          grep -q "Daily Market Dashboard" dist/index.html

      - name: Configurar git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit de outputs
        run: |
          git add data/dashboard_payload.json data/market_narrative.txt data/market_regime.txt data/last_refresh.json data/filtered_signal.json data/vital_knowledge_extracted.json data/reuters_extracted.json data/cnbc_extracted.json data/gmail_input_for_prompt.txt data/final_prompt.txt data/final_regime_prompt.txt dist/index.html
          git diff --cached --quiet || git commit -m "Auto-update dashboard data"

      - name: Push de outputs
        run: |
          git push

      - name: Subir artefactos
        uses: actions/upload-artifact@v6
        with:
          name: dashboard-build
          path: |
            data/dashboard_payload.json
            data/cnbc_extracted.json
            dist/index.html